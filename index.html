<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Do You Love Me?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:#fff;
}

.container{
    text-align:center;
}

img{
    width:450px;
}

h1{
    font-size:45px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}

#yes{
    background:#ff4da6;
    color:white;
}

#no{
    background:#ff4da6;
    color:white;
    position:absolute;
}
</style>
</head>

<body>

<div class="container">
    <img src="https://i.imgur.com/r9aU2xv.png">
    <h1>Do you love me? ❤️</h1>

    <button id="yes">Yes</button>
    <button id="no">No</button>
</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", function(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = function(){
    document.body.innerHTML = `
    <div style="text-align:center;font-family:Arial;">
        <img src="https://i.imgur.com/r9aU2xv.png" width="250">
        <h1>I knew it 😍❤️</h1>
    </div>`;
};
</script>

</body>
</html>
