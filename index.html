<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,sans-serif;
    background:white;
    overflow:hidden;
}

.container{
    text-align:center;
}

img{
    width:85vw;
    max-width:700px;
}

h1{
    font-size:60px;
    margin:20px 0;
}

.buttons{
    margin-top:20px;
}

button{
    padding:18px 45px;
    font-size:28px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#ff4da6;
    color:white;
}

#no{
    background:#ff4da6;
    color:white;
    position:absolute;
}
</style>
</head>
<body>

<div class="container">

    <!-- GIF Link Eka Danna -->
    <img src="https://media.tenor.com/8zH5mJc7R8gAAAAi/cute-bear.gif" alt="Cute Bear">

    <h1>Do you love me? ❤️</h1>

    <div class="buttons">
        <button id="yes">Yes</button>
        <button id="no">No</button>
    </div>

</div>

<script>
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

document.getElementById("yes").onclick = () => {
    document.body.innerHTML = `
    <div style="text-align:center;">
        <img src="https://media.tenor.com/8zH5mJc7R8gAAAAi/cute-bear.gif" style="width:85vw;max-width:700px;">
        <h1 style="font-size:70px;font-family:Arial;">I knew it 😍❤️</h1>
    </div>
    `;
};
</script>

</body>
</html>
